[dependency-groups]
dev = [
    "ddt==1.5.0",
    "django-debug-toolbar==3.5",
    "django-extensions==3.1.5",
    "mock==4.0.3",
    "pyopenssl==25.1.0",
    "pyvirtualdisplay==3.0",
    "selenium==4.3.0",
    "selenium-common",
    "werkzeug==2.0.3",
    "xlrd==2.0.1",
]

[project.optional-dependencies]
aws = [
    "gunicorn>=23.0.0",
]
