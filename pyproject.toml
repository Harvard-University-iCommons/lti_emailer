[project]
name = "lti-emailer"
version = "2.11"
requires-python = ">=3.10,<3.11"
dependencies = [
    "canvas-python-sdk",
    "oracledb==1.1.1",
    "django==3.2.16",
    "django-allow-cidr==0.5.0",
    "django-angular==2.3",
    "django-auth-lti",
    "django-cached-authentication-middleware==0.2.2",
    "django-canvas-lti-school-permissions",
    "django-coursemanager",
    "django-icommons-common",
    "django-icommons-ui",
    "django-redis-cache==3.0.1",
    "django-ssm-parameter-store",
    "django-storages==1.12.3",
    "django-watchman==1.3.0",
    "flanker==0.9.11",
    "harvard-django-utils",
    "hiredis==2.0.0",
    "psycopg2==2.9.3",
    "python-json-logger==2.0.4",
    "redis==3.5.3",
    "requests==2.28.1",
    "splunk-handler==3.0.0",
]

[tool.ruff.lint]
ignore = ["F403", "F405", "F841", "E741"]  # Globally ignore star-import warnings, unused vars, and ambiguous names

# TODO: Once TLT-5255 is completed. Edit the dependencies in the pyproject.toml file:
# for any libraries that were installed directly from GitHub,
# make sure that the dependency line has a specific version number.
# You can find the most recent published versions in the CodeArtifact repository.
# Remove the corresponding git lines in the [tool.uv.sources] section.
[tool.uv.sources]
django-angular = { git = "ssh://git@github.com/Harvard-University-iCommons/django-angular.git", rev = "v2.3" }
canvas-python-sdk = { git = "ssh://git@github.com/Harvard-University-iCommons/canvas_python_sdk.git", rev = "v1.3" }
django-icommons-common = { git = "ssh://git@github.com/Harvard-University-iCommons/django-icommons-common.git", rev = "v3.0" }
django-icommons-ui = { git = "ssh://git@github.com/Harvard-University-iCommons/django-icommons-ui.git", rev = "v2.1" }
django-auth-lti = { git = "ssh://git@github.com/Harvard-University-iCommons/django-auth-lti.git", rev = "v2.1.0" }
django-ssm-parameter-store = { git = "https://github.com/Harvard-University-iCommons/django-ssm-parameter-store.git", rev = "v0.6" }
harvard-django-utils = { git = "ssh://git@github.com/Harvard-University-iCommons/harvard-django-utils.git", rev = "v0.1" }
django-coursemanager = { git = "ssh://git@github.com/Harvard-University-iCommons/django-coursemanager.git", rev = "v0.6" }
django-canvas-lti-school-permissions = { git = "ssh://git@github.com/Harvard-University-iCommons/django-canvas-lti-school-permissions", rev = "v3.2" }
selenium-common = { git = "ssh://git@github.com/Harvard-University-iCommons/selenium_common.git", rev = "v1.4.3" }

